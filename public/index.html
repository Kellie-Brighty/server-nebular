<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Nebular</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px; width: 90%;
      position: relative;
      animation: fadeIn 0.8s ease-out;
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    .card.active {
      border-color: rgba(34,197,94,0.3);
      box-shadow: 0 0 60px rgba(34,197,94,0.06);
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #6b7280;
      margin: 0 auto 1.5rem;
      transition: all 0.5s;
    }
    .card.active .dot {
      background: #22c55e;
      box-shadow: 0 0 16px rgba(34,197,94,0.5);
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
    .msg { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .info {
      background: rgba(0,0,0,0.25);
      border-radius: 14px;
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .row { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .label { color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .val { color: #e2e8f0; font-weight: 500; }
    .val.ok { color: #22c55e; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="dot" id="dot"></div>
    <h1 id="title">Checking server...</h1>
    <p class="msg" id="msg">Connecting...</p>
    <div class="info">
      <div class="row"><span class="label">Status</span><span class="val" id="s">—</span></div>
      <div class="row"><span class="label">Uptime</span><span class="val" id="u">—</span></div>
      <div class="row"><span class="label">Checked</span><span class="val" id="t">—</span></div>
    </div>
  </div>
  <script>
    (async () => {
      try {
        const r = await fetch("/api/status");
        const d = await r.json();
        document.getElementById("card").classList.add("active");
        document.getElementById("title").textContent = "Server Nebular Active";
        document.getElementById("msg").textContent = d.message;
        document.getElementById("s").textContent = "ACTIVE";
        document.getElementById("s").classList.add("ok");
        const s = d.uptime;
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        document.getElementById("u").textContent = h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
        document.getElementById("t").textContent = new Date(d.timestamp).toLocaleTimeString();
      } catch {
        document.getElementById("title").textContent = "Server Offline";
        document.getElementById("msg").textContent = "Could not connect.";
      }
    })();
  </script>
</body>
</html>
